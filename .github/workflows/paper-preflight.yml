name: Paper Release Preflight

on:
  workflow_dispatch:

jobs:
  paper-release-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run strict paper-release gate
        run: bash scripts/workflow.sh paper-release-gate

      - name: Generate paper release dossier
        if: always()
        run: bash scripts/workflow.sh release-dossier

      - name: Generate paper submission bundle
        if: always()
        run: bash scripts/workflow.sh submission-bundle --bundle-id "ci-paper-release-bundle" --overwrite

      - name: Upload paper release dossier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-release-dossier
          path: |
            review/paper_audit/paper_release_dossier.json
            review/paper_audit/paper_release_dossier.md
          if-no-files-found: error

      - name: Upload paper submission bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-submission-bundle
          path: review/paper_audit/submission_bundles/ci-paper-release-bundle
          if-no-files-found: error
