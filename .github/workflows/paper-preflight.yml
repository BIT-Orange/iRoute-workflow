name: Paper Preflight

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  paper-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run canonical paper preflight
        run: bash scripts/workflow.sh paper-preflight
